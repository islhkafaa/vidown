name: Android CI

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Release APK
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$SIGNING_KEY_STORE_BASE64" | base64 --decode > release.jks
          ./gradlew assembleRelease \
            -PRELEASE_STORE_FILE=../release.jks \
            -PRELEASE_STORE_PASSWORD="$SIGNING_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$SIGNING_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$SIGNING_KEY_PASSWORD"

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Extract Changelog
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract the section for the latest version from CHANGELOG.md
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md

      - name: Create GitHub Release
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Vidown v${{ github.ref_name }}"
          files: app/build/outputs/apk/release/*.apk
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
